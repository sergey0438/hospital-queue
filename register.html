/* TOPBAR */
.topbar{
  position:relative;z-index:50;width:100%;height:68px;
  display:flex;align-items:center;
  background:rgba(255,255,255,.74);
  backdrop-filter:blur(32px) saturate(2) brightness(1.05);
  -webkit-backdrop-filter:blur(32px) saturate(2);
  border-bottom:1.5px solid rgba(0,100,90,.12);
  box-shadow:0 2px 24px rgba(0,80,70,.08),0 1px 0 rgba(255,255,255,.9) inset;
  flex-shrink:0;
}
.topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
  background:linear-gradient(90deg,transparent,rgba(0,180,160,.9) 20%,rgba(0,140,200,1) 50%,rgba(0,180,160,.9) 80%,transparent);
}
.logo-sec{
  display:flex;align-items:center;gap:13px;
  padding:0 24px;height:100%;
  border-right:1.5px solid rgba(0,100,90,.1);flex-shrink:0;
}
.lr{position:relative;width:44px;height:44px;flex-shrink:0}
.lr::before{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(from 0deg,#00C8B4,#0096DC,#00C8B4);
  animation:spin 5s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.lr img{position:relative;z-index:1;width:100%;height:100%;border-radius:50%;object-fit:cover;background:#fff}
.li strong{display:block;font-size:clamp(.58rem,1.05vw,.8rem);font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#0d3330;line-height:1.2}
.li span{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:#00897B;font-weight:500}
.t-lbl{
  padding:0 22px;font-size:clamp(.85rem,1.7vw,1.2rem);font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;color:#004D40;
  border-right:1.5px solid rgba(0,100,90,.1);
}
.t-right{margin-left:auto;padding:0 20px;display:flex;align-items:center;gap:8px}
.live{display:flex;align-items:center;gap:5px;font-size:.52rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#00897B}
.ld{width:6px;height:6px;border-radius:50%;background:#00C8B4;box-shadow:0 0 7px rgba(0,200,180,.7);animation:lp 1.8s ease-in-out infinite}
@keyframes lp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.7);opacity:.3}}

/* MAIN */
main{position:relative;z-index:10;width:100%;max-width:900px;padding:18px 18px 40px;display:flex;flex-direction:column;gap:14px}

/* INPUT */
.icard{
  position:relative;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);
  border:1.5px solid rgba(255,255,255,.95);border-radius:20px;padding:20px 18px;
  display:flex;gap:12px;align-items:flex-end;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,80,70,.09),0 0 0 1px rgba(255,255,255,.8) inset;
}
.icard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2.5px;
  background:linear-gradient(90deg,transparent,#00C8B4 30%,#0096DC 70%,transparent);
}
.icard::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.4) 0%,transparent 55%);}
.field{flex:1;position:relative;z-index:1}
.field label{display:block;font-size:.57rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#00897B;margin-bottom:7px}
.field input{
  width:100%;background:rgba(0,80,70,.04);border:1.5px solid rgba(0,100,90,.14);border-radius:10px;
  padding:12px 15px;font-family:'JetBrains Mono',monospace;font-size:1rem;color:#0d3330;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input::placeholder{color:rgba(13,51,48,.3)}
.field input:focus{border-color:rgba(0,180,160,.5);box-shadow:0 0 0 3px rgba(0,180,160,.1)}
.abtn{
  position:relative;z-index:1;
  background:linear-gradient(135deg,#00C8B4,#0079A8);color:#fff;border:none;
  border-radius:12px;padding:12px 20px;font-family:'Outfit',sans-serif;
  font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;white-space:nowrap;box-shadow:0 4px 18px rgba(0,180,160,.3);
  transition:all .2s;
}
.abtn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,180,160,.42)}
.abtn:active{transform:translateY(0)}

/* STATS */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sbox{
  background:rgba(255,255,255,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,255,255,.9);border-radius:16px;padding:14px;text-align:center;
  box-shadow:0 4px 16px rgba(0,80,70,.07),0 0 0 1px rgba(255,255,255,.7) inset;
  transition:box-shadow .25s;
}
.sbox:hover{box-shadow:0 8px 24px rgba(0,80,70,.11),0 0 0 1px rgba(255,255,255,.8) inset}
.sn{font-family:'JetBrains Mono',monospace;font-size:1.9rem;font-weight:700;color:#00897B;line-height:1}
.sl{font-size:.54rem;color:rgba(13,51,48,.4);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

/* SEC */
.secbar{display:flex;align-items:center;gap:10px;padding:0 3px}
.sectl{font-size:.57rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(13,51,48,.38);white-space:nowrap}
.secln{flex:1;height:1px;background:linear-gradient(90deg,rgba(0,100,90,.12),transparent)}

/* LIST */
.qlist{display:flex;flex-direction:column;gap:8px;list-style:none}
.qrow{
  position:relative;display:flex;align-items:center;gap:13px;
  background:rgba(255,255,255,.76);
  backdrop-filter:blur(14px) saturate(1.6);-webkit-backdrop-filter:blur(14px) saturate(1.6);
  border:1.5px solid rgba(255,255,255,.92);border-radius:14px;padding:13px 15px;
  animation:si .35s cubic-bezier(.22,1,.36,1);
  transition:background .2s,border-color .2s,box-shadow .2s;overflow:hidden;
  box-shadow:0 3px 12px rgba(0,80,70,.06),0 0 0 1px rgba(255,255,255,.7) inset;
}
.qrow::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.4) 0%,transparent 50%);}
.qrow:hover{background:rgba(255,255,255,.9);box-shadow:0 6px 20px rgba(0,80,70,.09),0 0 0 1px rgba(255,255,255,.8) inset}
.qrow.incab{
  border-color:rgba(255,140,0,.32);background:rgba(255,248,235,.78);
  box-shadow:0 0 0 3px rgba(255,152,0,.07),0 4px 18px rgba(255,100,0,.12),0 0 0 1px rgba(255,255,255,.7) inset;
}
@keyframes si{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

.qbadge{
  font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:700;color:#004D40;
  min-width:56px;text-align:center;
  background:rgba(0,180,160,.09);border:1.5px solid rgba(0,180,160,.2);
  border-radius:10px;padding:5px 8px;flex-shrink:0;transition:all .3s;
}
.qrow.incab .qbadge{background:rgba(255,140,0,.12);border-color:rgba(255,140,0,.28);color:#BF360C}
.qi{flex:1;min-width:0}
.qname{font-size:.95rem;font-weight:500;color:rgba(13,51,48,.9)}
.qtime{font-size:.62rem;color:rgba(13,51,48,.38);margin-top:2px;letter-spacing:.04em}
.incab-badge{
  display:inline-flex;align-items:center;gap:5px;flex-shrink:0;
  font-size:.57rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:#E65100;background:rgba(255,140,0,.1);border:1px solid rgba(255,140,0,.25);
  border-radius:999px;padding:3px 11px;
}
.qbtn{
  background:transparent;border:1.5px solid rgba(0,137,123,.3);color:#00695C;
  border-radius:8px;padding:7px 13px;font-family:'Outfit',sans-serif;
  font-size:.74rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.qbtn:hover{background:rgba(0,150,136,.1);border-color:#00897B}
.qbtn.prim{
  background:linear-gradient(135deg,rgba(0,180,160,.18),rgba(0,140,200,.18));
  border-color:rgba(0,180,160,.35);color:#005F56;
}
.qbtn.prim:hover{background:rgba(0,180,160,.22);box-shadow:0 0 14px rgba(0,180,160,.15)}

.empty{text-align:center;padding:48px 20px;
  background:rgba(255,255,255,.55);backdrop-filter:blur(10px);
  border:1.5px dashed rgba(0,100,90,.14);border-radius:16px;
  color:rgba(13,51,48,.38);font-size:.9rem;}
.ei{font-size:2.5rem;margin-bottom:10px;opacity:.35;display:block}

#toast{
  position:fixed;bottom:18px;right:18px;z-index:9999;
  background:rgba(255,255,255,.9);backdrop-filter:blur(16px);
  border:1.5px solid rgba(0,137,123,.2);color:#0d3330;border-radius:12px;
  padding:12px 18px;font-size:.84rem;font-weight:500;
  opacity:0;transform:translateY(12px);
  transition:all .3s cubic-bezier(.22,1,.36,1);pointer-events:none;
  box-shadow:0 8px 28px rgba(0,80,70,.12);
}
#toast.on{opacity:1;transform:translateY(0)}
</style>

<script>

const TTS = (() => {
  let voices=[], queue=[], running=false;
  const load=()=>voices=window.speechSynthesis.getVoices();
  load(); window.speechSynthesis.onvoiceschanged=load;
  function pick(){
    return voices.find(v=>v.lang==='uk-UA')||voices.find(v=>v.lang.startsWith('uk'))
        ||voices.find(v=>v.lang==='ru-UA')||voices.find(v=>v.lang.startsWith('ru'))
        ||voices[0]||null;
  }
  function next(){
    if(!queue.length){running=false;return;} running=true;
    const item=queue.shift();
    if(item.type==='pause'){setTimeout(next,item.ms);return;}
    const u=new SpeechSynthesisUtterance(item.text);
    const v=pick(); if(v){u.voice=v;u.lang=v.lang;}else u.lang='uk-UA';
    u.rate=item.rate??0.84; u.pitch=item.pitch??1.0; u.volume=item.volume??1.0;
    u.onend=next; u.onerror=next;
    window.speechSynthesis.speak(u);
  }
  return {
    say(text,opts={}){queue.push({type:'speak',text,...opts});if(!running)next();},
    wait(ms){queue.push({type:'pause',ms});},
    replace(fn){queue=[];fn();if(!running)next();}
  };
})();
function beep(freq,dur,vol){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator(),g=ctx.createGain();
    osc.connect(g);g.connect(ctx.destination);
    osc.type='sine';osc.frequency.value=freq||880;
    const t=ctx.currentTime;
    g.gain.setValueAtTime(vol||0.28,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+(dur||0.15));
    osc.start(t);osc.stop(t+(dur||0.15)+0.05);
    osc.onended=()=>ctx.close();
  }catch(e){}
}
function announceNext(n){
  beep(880,0.14,0.28);
  setTimeout(()=>{
    TTS.replace(()=>{
      TTS.say(`Пацієнт номер ${n} — запрошується до кабінету номер три.`,{rate:0.82});
      TTS.wait(1600);
      TTS.say(`Повторюємо: пацієнт номер ${n} — кабінет номер три.`,{rate:0.82});
    });
  },350);
}
function announceSilence(){
  beep(440,0.28,0.22);
  setTimeout(()=>{
    TTS.replace(()=>{
      TTS.say("Шановні пацієнти! Увага! О двадцятій годині десять хвилин оголошується Всеукраїнська хвилина мовчання. Просимо зупинитися і вшанувати пам'ять загиблих героїв.",{rate:0.78,pitch:0.96});
    });
  },700);
</script>

  <script>
    // ---------- CONFIG: вставь свои данные ----------

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Функция: получаем "сегодня" в часовом поясе Kyiv в формате YYYY-MM-DD
    function getKyivTodayISO() {
      // toLocaleDateString с локалью en-CA даёт YYYY-MM-DD
      return new Date().toLocaleDateString('en-CA', { timeZone: 'Europe/Kyiv' });
    }

    // Функция: выполняем проверку даты и при необходимости сбрасываем очередь
    function checkAndResetIfNeeded() {
      const today = getKyivTodayISO(); // например "2025-12-10"
      const rootRef = db.ref('/');

      // Читаем lastReset

const db=firebase.database();

function today(){return new Date().toLocaleDateString('en-CA',{timeZone:'Europe/Kyiv'});}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),3000);}

db.ref('lastReset').get().then(s=>{
  const t=today();
  if(!s.exists()||s.val()!==t) db.ref('/').update({'/lastNumber':0,'/queue':{},'/lastReset':t});
});

function add(){
  const v=document.getElementById('inp').value.trim();
  if(!v){toast('⚠ Введіть номер');return;}
  db.ref('lastNumber').transaction(n=>(n||0)+1,(err,ok,snap)=>{
    if(err){toast('❌ Помилка');return;}
    const n=snap.val();
    db.ref('queue/'+n).set({name:v,status:'waiting',addedAt:Date.now()})
      .then(()=>{document.getElementById('inp').value='';toast(`✓ №${n} доданий`);});
  });
}
document.getElementById('addBtn').addEventListener('click',add);
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')add();});

window.inviteIn=function(num){
  db.ref('queue').once('value').then(snap=>{
    snap.forEach(s=>{const d=s.val();if(d&&d.status==='in')db.ref('queue/'+s.key).update({status:'done'});});
    db.ref('queue/'+num).update({status:'in',announced:true});
    db.ref('call').set({number:num,ts:Date.now()});
    toast(`✓ №${num} запрошений`);
  });
};

window.markOut=function(num){
  db.ref('queue').once('value').then(snap=>{
    const w=[];
    snap.forEach(s=>{const d=s.val();if(d&&d.status==='waiting')w.push(Number(s.key));});
    db.ref('queue/'+num).update({status:'done'});
    const nxt=w.sort((a,b)=>a-b)[0];
    if(nxt!=null){
      db.ref('queue/'+nxt).update({status:'in',announced:true});
      db.ref('call').set({number:nxt,ts:Date.now()});
    }
    toast(`✓ №${num} вийшов`);
  });
};

db.ref('queue').on('value',snap=>{
  const list=document.getElementById('qList');
  list.innerHTML='';
  let w=0,d=0,total=0;
  snap.forEach(s=>{
    const v=s.val();if(!v)return; total++;
    const isIn=v.status==='in', isW=v.status==='waiting';
    if(!isIn&&!isW){d++;return;}
    if(isW) w++;
    const li=document.createElement('li');
    li.className='qrow'+(isIn?' incab':'');
    const t=v.addedAt?new Date(v.addedAt).toLocaleTimeString('uk-UA',{hour:'2-digit',minute:'2-digit'}):'';
    li.innerHTML=`
      <div class="qbadge">№${s.key}</div>
      <div class="qi">
        <div class="qname">${v.name}</div>
        ${t?`<div class="qtime">Додано о ${t}</div>`:''}
      </div>
      ${isIn
        ?`<div class="incab-badge">🟠 У кабінеті</div>
          <button class="qbtn" onclick="markOut(${s.key})">Вийшов</button>`
        :`<button class="qbtn prim" onclick="inviteIn(${s.key})">Запросити</button>`
      }
    `;
    list.appendChild(li);
  });
  if(!list.querySelector('.qrow'))
    list.innerHTML=`<div class="empty"><span class="ei">🏥</span>Черга порожня</div>`;
  document.getElementById('sT').textContent=total;
  document.getElementById('sW').textContent=w;
  document.getElementById('sD').textContent=d;
});
